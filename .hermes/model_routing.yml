# Human-readable routing map for Scraplands Hermes.
# NOT loaded by Hermes core — runtime enforcement is in ~/.hermes/config.yaml
#
# Canonical agent playbook (load via scraplands-hermes):
#   ~/.hermes/skills/roblox-development/scraplands-hermes/references/model_routing.md

canonical_doc: skills/roblox-development/scraplands-hermes/references/model_routing.md
enforcement: config.yaml
policy_type: role_based_orchestrator
fallback_semantics: provider_failures_only

primary_orchestrator:
  provider: openai-codex
  model: gpt-5.5
  config_keys:
    - model.provider
    - model.default
  role: project_lead_reasoning_engine_final_reviewer
  responsibilities:
    - product_decisions
    - game_design
    - economy_balancing
    - monetization_decisions
    - ux_ui_decisions
    - architecture
    - planning
    - feature_specifications
    - bug_triage_synthesis
    - changelog_generation
    - documentation_direction
    - localization_review
    - project_management
    - final_recommendations

coding_worker:
  provider: openrouter
  model: qwen/qwen3-coder
  config_keys:
    - delegation.provider
    - delegation.model
  mechanism: delegate_task
  role: primary_software_engineer
  responsibilities:
    - roblox_luau_implementation
    - refactors
    - multi_file_code_changes
    - performance_optimization
    - static_analysis
    - code_review
    - root_cause_analysis
    - test_generation
    - github_issue_implementation
    - large_codebase_navigation
    - roblox_luau_code_generation

lightweight_worker:
  provider: openai-api
  model: gpt-4.1-mini
  config_keys:
    - auxiliary.*
  role: low_cost_utility_worker
  responsibilities:
    - summaries
    - formatting
    - data_transformation
    - small_helper_tasks
    - log_cleanup
    - simple_documentation_generation

auto_delegate_to_qwen_when:
  - more_than_one_file_involved
  - estimated_change_exceeds_200_lines
  - implementation_requested
  - refactor_requested
  - code_review_requested
  - performance_optimization_requested
  - bug_investigation_requested
  - architecture_validation_with_codebase_inspection_requested
  - github_issue_implementation_requested
  - roblox_luau_code_generation_requested
  - static_analysis_across_multiple_files_needed
  - root_cause_analysis_in_code_needed
  - test_generation_needed

keep_on_gpt55_when:
  - product_design_discussion
  - game_economy_balancing
  - monetization_decisions
  - ux_ui_decisions
  - roadmapping
  - feature_prioritization
  - changelog_writing
  - copywriting
  - localization_review
  - strategic_decisions
  - final_review_and_synthesis

coding_workflow:
  - gpt55_analyzes_request
  - gpt55_creates_plan_and_acceptance_criteria
  - delegate_implementation_to_qwen3_coder
  - qwen_returns_files_commands_tests_risks
  - gpt55_reviews_correctness_and_alignment
  - gpt55_presents_final_recommendation

large_coding_workflow:
  - break_into_smaller_subtasks
  - delegate_independent_subtasks_to_qwen3_coder
  - avoid_parallel_workers_touching_same_files
  - aggregate_results
  - verify
  - gpt55_final_review

fallback_chain:
  config_key: fallback_providers
  purpose: provider_failure_recovery_only
  entries:
    - openrouter/openai/gpt-5.5
    - openrouter/qwen/qwen3-coder
    - openai-api/gpt-4.1-mini
    - openrouter/openai/gpt-4.1-mini
